<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Scalosaurus">
  <defs>
    <linearGradient id="sc-tile" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#19cbb6"/>
      <stop offset="1" stop-color="#0a9184"/>
    </linearGradient>
    <linearGradient id="sc-sheen" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="118" fill="url(#sc-tile)"/>
  <rect x="16" y="16" width="480" height="480" rx="118" fill="url(#sc-sheen)"/>

  <ellipse cx="256" cy="398" rx="140" ry="18" fill="#000000" opacity="0.13"/>

  <!-- growing plates = SCALE (amber), behind the body -->
  <g fill="#ffb020" stroke="#7a4a00" stroke-width="3" stroke-linejoin="round">
    <path d="M172 276 L188 236 L204 276 Z"/>
    <path d="M212 276 L232 222 L252 276 Z"/>
    <path d="M258 276 L282 206 L306 276 Z"/>
    <path d="M312 276 L340 188 L368 276 Z"/>
  </g>

  <!-- minimal geometric stegosaurus (white) -->
  <g fill="#ffffff">
    <!-- tail -->
    <path d="M150 300 L92 286 L118 322 Z"/>
    <!-- body capsule -->
    <rect x="140" y="270" width="244" height="92" rx="46"/>
    <!-- head -->
    <circle cx="392" cy="306" r="42"/>
    <!-- legs -->
    <rect x="186" y="348" width="40" height="62" rx="20"/>
    <rect x="300" y="348" width="40" height="62" rx="20"/>
  </g>

  <!-- tail tip spikes (amber) -->
  <g fill="#ffb020" stroke="#7a4a00" stroke-width="3" stroke-linejoin="round">
    <path d="M92 286 L70 276 L82 296 Z"/>
    <path d="M104 296 L86 300 L98 312 Z"/>
  </g>

  <!-- eye -->
  <circle cx="406" cy="300" r="7" fill="#0a8578"/>

  <!-- resize handles framing the corners = drag to resize (amber) -->
  <g stroke="#ffe0a3" stroke-width="11" stroke-linecap="round" fill="none" opacity="0.9">
    <path d="M120 150 h34 M120 150 v34"/>
    <path d="M392 150 h-34 M392 150 v34"/>
  </g>
</svg>
