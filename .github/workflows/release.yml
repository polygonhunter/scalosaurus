name: Release Obsidian plugin

# Manually triggered: builds the plugin and creates (or refreshes) the
# GitHub release whose tag matches manifest.json's version, with the
# main.js / manifest.json / styles.css assets Obsidian needs.
on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      # v1 produced Sigstore 0.2.1 bundles that current verifiers reject;
      # v4 emits the current bundle format.
      - name: Attest build provenance for the release assets
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create or refresh the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" main.js manifest.json styles.css --clobber
          else
            gh release create "$VERSION" \
              --target main \
              --title "$VERSION" \
              --notes "Scalosaurus $VERSION" \
              main.js manifest.json styles.css
          fi
